{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — Sofias</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="min-h-screen bg-gray-100">

  <header class="bg-white border-b border-gray-200">
    <div class="mx-auto max-w-5xl px-4 py-4 flex items-center justify-between">
      <span class="font-semibold text-gray-800">Sofias</span>
      <form method="post" action="{% url 'accounts:logout' %}">
        {% csrf_token %}
        <button type="submit"
          class="text-sm text-gray-500 hover:text-gray-700 transition-colors">
          Sign out
        </button>
      </form>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-16 text-center">
    <h1 class="text-3xl font-bold text-gray-900">Welcome back</h1>
    <p class="mt-3 text-gray-500">Signed in as <span class="font-medium text-gray-700">{{ request.user.email }}</span></p>
  </main>

</body>
</html>
