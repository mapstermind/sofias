<!-- Session expired modal -->
<div id="session-expired-modal"
     class="fixed inset-0 z-50 items-center justify-center p-4"
     style="display:none">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/40"></div>
  <!-- Dialog -->
  <div class="relative bg-white rounded-xl shadow-xl w-full max-w-md p-6 z-10">
    <!-- Icon -->
    <div class="flex justify-center mb-4">
      <div class="rounded-full bg-amber-50 p-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
        </svg>
      </div>
    </div>
    <h2 class="text-lg font-semibold text-gray-900 text-center mb-2">Sesión expirada</h2>
    <p class="text-sm text-gray-600 text-center">
      Tu sesión ha expirado por inactividad. Tu progreso guardado está a salvo — inicia sesión de nuevo para continuar.
    </p>
    <div class="mt-6">
      <a href="{% url 'accounts:request_otp' %}"
         class="block w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white text-center hover:bg-indigo-500 transition-colors">
        Iniciar sesión de nuevo
      </a>
    </div>
  </div>
</div>
