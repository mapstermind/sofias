<!-- Progress saved modal -->
<div id="progress-saved-modal"
     class="fixed inset-0 z-50 items-center justify-center p-4"
     style="display:none">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/40"></div>
  <!-- Dialog -->
  <div class="relative bg-white rounded-xl shadow-xl w-full max-w-md p-6 z-10">
    <!-- Icon -->
    <div class="flex justify-center mb-4">
      <div class="rounded-full bg-indigo-50 p-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
    </div>
    <h2 class="text-lg font-semibold text-gray-900 text-center mb-2">Progreso guardado</h2>
    <p class="text-sm text-gray-600 text-center">
      Tus respuestas han sido guardadas. Puedes continuar respondiendo ahora o en otro momento — tu progreso estará aquí cuando regreses.
    </p>
    <div class="mt-6 flex flex-col sm:flex-row gap-3">
      <button
        type="button"
        onclick="document.getElementById('progress-saved-modal').style.display='none'"
        class="flex-1 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white text-center hover:bg-indigo-500 transition-colors">
        Continuar respondiendo
      </button>
      <a href="{% url 'core:home' %}"
         class="flex-1 rounded-lg border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-700 text-center hover:bg-gray-50 transition-colors">
        Ir al inicio
      </a>
    </div>
  </div>
</div>
