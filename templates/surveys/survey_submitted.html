<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you – {{ survey.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">

  <div class="max-w-md w-full text-center bg-white rounded-2xl shadow-sm border border-gray-200 px-10 py-14">

    <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
      <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900">Thank you!</h1>
    <p class="mt-3 text-gray-500 text-sm leading-relaxed">
      Your response to <span class="font-medium text-gray-700">{{ survey.title }}</span> has been recorded.
    </p>

    <a href="{% url 'surveys:survey_detail' survey_id=survey.id %}"
      class="mt-8 inline-block rounded-lg border border-gray-300 px-5 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
      Submit another response
    </a>

  </div>

</body>
</html>
