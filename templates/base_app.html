{% extends "base.html" %}
{% load static %}

{% block body %}
<header class="bg-white border-b border-gray-200">
  <div class="mx-auto max-w-5xl px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="{% url 'core:home' %}" class="flex items-center gap-2">
        <img src="{% static 'img/logo.svg' %}" alt="Sofias" class="h-8 mt-2 mb-3 w-auto">
        <span class="text-xl font-semibold text-gray-900">SOFIA-S</span>
      </a>
      {% block header_nav %}{% endblock %}
    </div>
    <form method="post" action="{% url 'accounts:logout' %}">
      {% csrf_token %}
      <button type="submit" class="text-sm text-gray-500 hover:text-gray-700 transition-colors group w-28 text-right">
        <span class="group-hover:hidden">{{ request.user.username }}</span>
        <span class="hidden group-hover:inline">Cerrar sesión</span>
      </button>
    </form>
  </div>
</header>

<main class="mx-auto max-w-5xl px-4 py-10">
  {% block content %}{% endblock %}
</main>
{% endblock %}
